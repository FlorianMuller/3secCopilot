name: Sideload build

# Build an unsigned IPA on every version tag and publish it as a GitHub Release.
# The IPA is intentionally left unsigned: SideStore re-signs it on-device at install
# time with the user's free Apple ID, so no Apple Developer account / secrets are needed.
on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (must point at a commit)"
        required: true

permissions:
  contents: write

concurrency:
  group: sideload-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      EXPO_BUILD_MODE: sideload
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # Full history + tags so app.config.ts can resolve the version via
          # `git describe --tags --exact-match HEAD`.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS project (sideload)
        run: npx expo prebuild --platform ios --clean

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -workspace ios/3secsCopilot.xcworkspace \
            -scheme 3secsCopilot \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        id: package
        run: |
          set -euo pipefail
          PRODUCTS_DIR="ios/build/Build/Products/Release-iphoneos"
          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in $PRODUCTS_DIR" >&2
            exit 1
          fi
          IPA_NAME="3secsCopilot-${{ steps.tag.outputs.tag }}.ipa"
          WORK="$(mktemp -d)"
          mkdir -p "$WORK/Payload"
          cp -R "$APP_PATH" "$WORK/Payload/"
          ( cd "$WORK" && zip -qry "$IPA_NAME" Payload )
          mv "$WORK/$IPA_NAME" "$IPA_NAME"
          echo "ipa=$IPA_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "${{ steps.package.outputs.ipa }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "Sideload build. Download the .ipa on your iPhone and open it in SideStore to install." \
            || gh release upload "${{ steps.tag.outputs.tag }}" \
                 "${{ steps.package.outputs.ipa }}" --clobber

  # Regenerate the AltStore/SideStore source from all releases and publish it to
  # GitHub Pages so SideStore can auto-detect new versions. Runs after the
  # release above so the new IPA asset is already attached.
  publish-source:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Pages deploys must not be cancelled mid-flight; serialize them separately
    # from the build concurrency group above.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate source.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generateAltSource.mjs public/source.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
